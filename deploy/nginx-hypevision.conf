# /etc/nginx/sites-available/hypevision
# domain veya IP ile erişim — SSL sonra eklenebilir (certbot)

server {
    listen 80;
    server_name _;   # IP: server_name 123.45.67.89;  domain: panel.ornek.com

    client_max_body_size 20M;

    root /root/hp-pan/dist;
    index index.html;

    # React SPA — /notifications, /reports vb.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
    }
}
