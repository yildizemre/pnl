services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hype
      POSTGRES_PASSWORD: hype_secret
      POSTGRES_DB: hypevision
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hype -d hypevision"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://hype:hype_secret@db:5432/hypevision
      JWT_SECRET: change-me-in-production
      WS_PUSH_SECONDS: "8"
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
